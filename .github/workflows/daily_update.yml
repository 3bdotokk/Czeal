name: Czeal AI Auto Publisher
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # هذا السطر هو الذي سيحل مشكلة الفشل في النشر
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run AI Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/generate.py

      - name: Commit changes
        run: |
          git config --global user.name 'Czeal-Bot'
          git config --global user.email 'bot@czeal.com'
          git add index.html
          git commit -m "🤖 خبر جديد بواسطة AI" || exit 0
          git push
