name: Czeal AI Auto Publisher
on:
  schedule:
    - cron: '0 0 * * *' # يعمل تلقائياً كل يوم الساعة 12 منتصف الليل
  workflow_dispatch: # يسمح لك بتشغيله يدوياً لتجربته الآن

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run AI Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python .github/scripts/generate.py

      - name: Commit changes
        run: |
          git config --global user.name 'Czeal Bot'
          git config --global user.email 'bot@czeal.com'
          git add index.html
          git commit -m "🤖 تم تحديث الخبر اليومي بواسطة AI" || exit 0
          git push
