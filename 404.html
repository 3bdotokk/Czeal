<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Page Not Found | Czeal</title>

  <meta name="description" content="The page you are looking for does not exist on Czeal. Return home to explore AI tools for students." />
  <meta name="robots" content="noindex, follow" />

  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Dark Mode -->
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <!-- Load Theme -->
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>

  <!-- Polish -->
  <link rel="stylesheet" href="/assets/css/polish.css">
</head>

<body class="bg-white text-black dark:bg-black dark:text-white transition-colors duration-300">

  <main class="min-h-screen flex items-center justify-center px-6">

    <div class="max-w-xl mx-auto text-center">

      <div class="inline-flex px-4 py-2 border border-gray-200 dark:border-zinc-700 rounded-full text-sm mb-6 reveal">
        Error 404
      </div>

      <h1 class="reveal text-5xl md:text-7xl font-bold leading-tight mb-6" data-delay="1">
        Page <span class="text-gradient">not found</span>
      </h1>

      <p class="reveal text-lg text-gray-600 dark:text-gray-400 mb-10" data-delay="2">
        The page you were looking for doesn't exist or may have been moved.
      </p>

      <div class="reveal flex flex-col sm:flex-row gap-4 justify-center" data-delay="3">

        <a
          href="/"
          class="btn-primary font-medium px-6 py-3 rounded-2xl"
        >
          Back to Home
        </a>

        <a
          href="/#blog"
          class="btn-ghost border border-gray-300 dark:border-zinc-700 font-medium px-6 py-3 rounded-2xl"
        >
          Browse Articles
        </a>

      </div>

    </div>

  </main>

  <script src="/assets/js/reveal.js" defer></script>

</body>
</html>
