<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CZEAL | منصة المونديال الذكية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0a0a0a; --primary-teal: #008080; --text-muted: #888; }
        body { background-color: var(--bg-color); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        .site-wrapper { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }
        .site-header { border-bottom: 3px solid var(--primary-teal); padding-bottom: 10px; margin-bottom: 30px; }
        .brand { font-weight: 900; font-size: 1.8rem; }
        .feed-item { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid #222; align-items: center; }
        .feed-content { flex: 1; }
        .feed-title { font-size: 1.1rem; font-weight: 700; line-height: 1.3; }
        .feed-image { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--primary-teal); }
        .ai-tag { color: var(--primary-teal); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="site-wrapper">
        <header class="site-header">
            <div class="brand">CZEAL<span style="color:var(--primary-teal)">.COM</span></div>
        </header>

        <div id="articles-feed">
            <div class="feed-item">
                <div class="feed-content">
                    <span class="ai-tag">تحليل ذكي</span>
                    <div class="feed-title">مرحباً بك في Czeal! جاري إعداد أول تقرير لمونديال 2046 بالذكاء الاصطناعي...</div>
                </div>
                <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=200" class="feed-image">
            </div>

            </div>
    </div>
</body>
</html>
