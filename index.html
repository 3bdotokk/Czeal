<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CZEAL | الرؤية الرياضية المستقبلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --primary: #008080;
            --accent: #00ffcc;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; line-height: 1.6;
        }

        /* الهيدر الأنيق */
        header {
            background-color: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--primary); }

        /* الحاوية الرئيسية */
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* بطاقة المقال المتطورة */
        .post-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }
        .post-image {
            width: 100%; height: 220px;
            object-fit: cover;
            border-bottom: 4px solid var(--primary);
        }
        .post-content { padding: 20px; }
        .post-meta { 
            color: var(--accent); 
            font-size: 12px; font-weight: bold; 
            margin-bottom: 8px; display: block;
        }
        .post-title { font-size: 20px; font-weight: 700; margin: 0 0 12px 0; line-height: 1.4; }
        .post-excerpt { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }

        /* زر قراءة المزيد */
        .btn-read {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        /* التجاوب مع الشاشات الكبيرة */
        @media (min-width: 768px) {
            .post-card { flex-direction: row; align-items: center; }
            .post-image { width: 35%; height: 200px; border-bottom: none; border-left: 4px solid var(--primary); }
            .post-content { width: 65%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">CZEAL<span>.COM</span></div>
</header>

<div class="container">
    <article class="post-card">
        <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=600" class="post-image" alt="World Cup">
        <div class="post-content">
            <span class="post-meta">توقعات الذكاء الاصطناعي • 2046</span>
            <h2 class="post-title">فجر عهد جديد: كيف سيعيد مونديال 2046 صياغة تاريخ كرة القدم؟</h2>
            <p class="post-excerpt">نظرة تقنية معمقة في التطورات المتوقعة للمونديال القادم، من الملاعب الذكية إلى تحليلات اللاعبين اللحظية...</p>
            <a href="#" class="btn-read">اقرأ التقرير كاملاً</a>
        </div>
    </article>

    </div>

<footer style="text-align: center; padding: 40px; color: var(--text-dim); font-size: 12px;">
    &copy; 2026 CZEAL.COM | جميع الحقوق محفوظة
</footer>

</body>
</html>
