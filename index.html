<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czeal - مولد الصور بالذكاء الاصطناعي FLUX.2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .generator-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            width: 100%;
        }

        button:hover {
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #667eea;
            font-weight: bold;
        }

        .result {
            margin-top: 30px;
            text-align: center;
        }

        .result img {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .error {
            color: #e74c3c;
            text-align: center;
            padding: 15px;
            background: #fdecea;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
    <!-- مكتبة Puter.js -->
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="container">
        <h1>🎨 Czeal AI</h1>
        <p class="subtitle">توليد صور بالذكاء الاصطناعي - مجاناً وبسرعة فائقة</p>

        <div class="generator-box">
            <h2 style="margin-bottom: 15px;">✨ مولد الصور FLUX.2</h2>
            <p style="margin-bottom: 20px; color: #555;">اكتب وصفاً باللغة الإنجليزية للحصول على أفضل النتائج</p>
            
            <textarea id="prompt" rows="3" placeholder="Example: A majestic lion sitting on a throne in a futuristic city, neon lights, 4k, cinematic lighting"></textarea>
            
            <button id="generateBtn">🚀 توليد الصورة</button>
            
            <div id="loading" class="loading">
                ⏳ جاري توليد الصورة... قد يستغرق 5-10 ثوانٍ
            </div>
            
            <div id="result" class="result"></div>
        </div>

        <footer>
            Czeal.com - توليد الصور بالذكاء الاصطناعي FLUX.2
        </footer>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('prompt');
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');

        generateBtn.addEventListener('click', async function() {
            const prompt = promptInput.value.trim();
            
            if (!prompt) {
                alert('الرجاء كتابة وصف للصورة');
                return;
            }

            // تعطيل الزر وإظهار التحميل
            generateBtn.disabled = true;
            loadingDiv.style.display = 'block';
            resultDiv.innerHTML = '';

            try {
                // استدعاء نموذج FLUX.2 عبر Puter.js
                const images = await puter.ai.txt2img(prompt, 'black-forest-labs/flux.2-dev');
                
                if (images && images.length > 0) {
                    // عرض الصورة الأولى
                    resultDiv.innerHTML = `<img src="${images[0].url}" alt="الصورة المولوّدة">`;
                } else {
                    throw new Error('لم يتم استلام أي صورة');
                }
            } catch (error) {
                console.error('خطأ:', error);
                resultDiv.innerHTML = `<div class="error">❌ حدث خطأ: ${error.message || 'فشل توليد الصورة. حاول مرة أخرى'}</div>`;
            } finally {
                // إعادة تمكين الزر وإخفاء التحميل
                generateBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        });

        // توليد بالضغط على Enter
        promptInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateBtn.click();
            }
        });
    </script>
</body>
</html>
