<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CZEAL | مستقبل التغطية الرياضية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --teal: #008080;
            --text: #ffffff;
            --dim: #a0a0a0;
        }

        /* تصفير الإعدادات لضمان الثبات */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden; /* يمنع الحركة الجانبية تماماً */
            touch-action: pan-y; /* يسمح فقط بالتمرير للأعلى والأسفل */
        }

        header {
            background: rgba(10, 10, 10, 0.95);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--teal);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--teal); }

        /* الحاوية الرئيسية ثابتة العرض ومرنة التجاوب */
        .container { 
            width: 100%; 
            max-width: 600px; /* العرض المثالي للموبايل والتابلت */
            margin: 0 auto; 
            padding: 15px; 
        }

        /* تصميم البطاقة الاحترافي */
        .post-card {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #222;
            overflow: hidden;
            display: block; /* Stacked */
        }

        .post-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 3px solid var(--teal);
        }

        .post-content { padding: 15px; }
        .post-meta { color: var(--teal); font-size: 11px; font-weight: bold; }
        .post-title { font-size: 18px; font-weight: 700; margin: 8px 0; line-height: 1.4; }
        .post-excerpt { color: var(--dim); font-size: 13px; line-height: 1.5; }

        .btn-read {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: var(--teal);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        footer { text-align: center; padding: 30px; color: #444; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CZEAL<span>.COM</span></div>
</header>

<div class="container">
    
    <article class="post-card">
        <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=800" class="post-image">
        <div class="post-content">
            <span class="post-meta">نظام CZEAL AI • نشط</span>
            <h2 class="post-title">مرحباً بك! جاري الاتصال بخوارزميات المونديال...</h2>
            <p class="post-excerpt">بمجرد تشغيل المحرك (Workflow)، ستختفي هذه الرسالة ويظهر أول خبر رياضي مولد بالذكاء الاصطناعي هنا.</p>
        </div>
    </article>

    </div>

<footer>
    &copy; 2026 CZEAL.COM | منصة رياضية ذكية ثابتة التطور
</footer>

</body>
</html>
